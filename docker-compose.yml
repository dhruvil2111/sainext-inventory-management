services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: sainext
      POSTGRES_PASSWORD: sainext
      POSTGRES_DB: sainext
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sainext"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  backend:
    build: ./backend
    environment:
      DATABASE_URL: postgresql+psycopg2://sainext:sainext@db:5432/sainext
      JWT_SECRET: dev-secret-change-me-please-use-32-characters
      REDIS_URL: redis://redis:6379/0
      CORS_ORIGINS: http://localhost:5173,http://localhost:4173
      SEED_ON_STARTUP: "true"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    ports:
      - "8000:8000"
    # run DB migrations, then start the API
    command: sh -c "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000"

  worker:
    build: ./backend
    environment:
      DATABASE_URL: postgresql+psycopg2://sainext:sainext@db:5432/sainext
      REDIS_URL: redis://redis:6379/0
      SEED_ON_STARTUP: "false"
    depends_on:
      db:
        condition: service_healthy
      backend:
        condition: service_started
    command: python -m app.workers.expire_blocks

  frontend:
    build: ./frontend
    environment:
      VITE_API_BASE: /api
      VITE_PROXY_TARGET: http://backend:8000
    depends_on:
      - backend
    ports:
      - "5173:5173"
    # Bind-mount the source for hot reload; keep the image's node_modules.
    volumes:
      - ./frontend:/app
      - /app/node_modules
    command: npm run dev

volumes:
  pgdata:
